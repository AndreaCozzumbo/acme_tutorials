<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Presentation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .slide {
            background: white;
            border-radius: 16px;
            padding: 60px;
            max-width: 900px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 3em;
            color: #1a202c;
            margin: 0 0 0.5em 0;
            font-weight: 800;
        }
        p {
            font-size: 1.5em;
            color: #4a5568;
            margin: 0;
            line-height: 1.6;
        }
        .subtitle {
            font-size: 1.2em;
            color: #718096;
            margin-top: 1em;
        }
        .cta {
            margin-top: 2em;
            padding: 1em 2em;
            background: #667eea;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s;
        }
        .cta:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="slide">
        <h1>📊 Sample Presentation</h1>
        <p>Replace this file with your exported Keynote presentation</p>
        <p class="subtitle">Export from Keynote: File → Export To → HTML</p>
        <a href="#" class="cta">Get Started</a>
    </div>
</body>
</html>
