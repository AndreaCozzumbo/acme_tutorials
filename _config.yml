# Jupyter Book Configuration
# Learn more at https://jupyterbook.org/customize/config.html

title: ACME Tutorials
author: Samuele Ronchini

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: "off"
  timeout: 180
  allow_errors: false

# Exclude patterns
exclude_patterns: [_build, Thumbs.db, .DS_Store, "**.ipynb_checkpoints", "**/cosmo_MCMC", "**/pop_gwfish_results", "**/tutorial_results", "**/waveforms", "**/gcn_alerts", "**/images"]

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: acme_tutorials.tex

# Information about where the book exists on the web
repository:
  url: https://github.com/samueleronchini/acme_tutorials
  branch: main

# Add GitHub buttons to your book
html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  home_page_in_navbar: true
  baseurl: https://samueleronchini.github.io/acme_tutorials/

# Launch buttons for interactive sessions
launch_buttons:
  notebook_interface: jupyterlab
  binderhub_url: https://mybinder.org
  thebe: true
  thebe_config:
    use_thebe_lite: false

# MyST settings
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - html_admonition
    - html_image
    - linkify
    - replacements
    - smartquotes
    - substitution
